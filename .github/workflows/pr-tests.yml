name: PR Tests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set Maven wrapper permissions
        run: chmod +x mvnw

      - name: Build
        run: ./mvnw -B -ntp -P!quality-gates-all,nullaway -DskipTests install

      - name: Upload Maven repository
        uses: actions/upload-artifact@v4
        with:
          name: maven-repository
          path: ~/.m2/repository
          if-no-files-found: error

      - name: Upload build outputs
        uses: actions/upload-artifact@v4
        with:
          name: build-target
          path: target
          if-no-files-found: error

  test-unit:
    name: test / unit
    if: ${{ github.event.pull_request.draft == false }}
    needs:
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      
      - name: Set Maven wrapper permissions
        run: chmod +x mvnw

      - name: Download Maven repository
        uses: actions/download-artifact@v4
        with:
          name: maven-repository
          path: ~/.m2/repository

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-target
          path: target

      - name: Run unit tests
        run: ./mvnw -B -ntp -P!quality-gates-all,nullaway -o verify

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco
          if-no-files-found: error

  package:
    if: ${{ github.event.pull_request.draft == false }}
    needs:
      - build
      - test-unit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set Maven wrapper permissions
        run: chmod +x mvnw

      - name: Download Maven repository
        uses: actions/download-artifact@v4
        with:
          name: maven-repository
          path: ~/.m2/repository

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-target
          path: target

      - name: Run package build
        run: ./mvnw -B -ntp -P!quality-gates-all,nullaway -o -DskipTests package

  quality-crap-utils-java:
    name: verify / quality-crap-utils-java
    if: ${{ github.event.pull_request.draft == false }}
    needs:
      - build
      - test-unit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set Maven wrapper permissions
        run: chmod +x mvnw

      - name: Download Maven repository
        uses: actions/download-artifact@v4
        with:
          name: maven-repository
          path: ~/.m2/repository

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-target
          path: target

      - name: Download JaCoCo report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: Run crap-java gate
        run: ./mvnw -B -ntp -P!quality-gates-all,quality-gate-crap,nullaway -o verify

  quality-cognitive-utils-java:
    name: verify / quality-cognitive-utils-java
    if: ${{ github.event.pull_request.draft == false }}
    needs:
      - build
      - test-unit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set Maven wrapper permissions
        run: chmod +x mvnw

      - name: Download Maven repository
        uses: actions/download-artifact@v4
        with:
          name: maven-repository
          path: ~/.m2/repository

      - name: Download build outputs
        uses: actions/download-artifact@v4
        with:
          name: build-target
          path: target

      - name: Download JaCoCo report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: Run cognitive-java gate
        run: ./mvnw -B -ntp -P!quality-gates-all,quality-gate-cognitive,nullaway -o verify
