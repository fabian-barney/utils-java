name: PR Tests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build / java ${{ matrix.java }}
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["21", "25"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Set Maven wrapper permissions
        run: chmod +x mvnw

      - name: Build
        run: ./mvnw -B -ntp -P!quality-gates-all,nullaway -DskipTests install

      - name: Upload Maven repository
        uses: actions/upload-artifact@v7
        with:
          name: maven-repository-java-${{ matrix.java }}
          path: /home/runner/.m2/repository
          if-no-files-found: error

      - name: Upload build outputs
        uses: actions/upload-artifact@v7
        with:
          name: build-target-java-${{ matrix.java }}
          path: target
          if-no-files-found: error

  test-unit:
    name: test / unit / java ${{ matrix.java }}
    if: ${{ github.event.pull_request.draft == false }}
    needs:
      - build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["21", "25"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set Maven wrapper permissions
        run: chmod +x mvnw

      - name: Download Maven repository
        uses: actions/download-artifact@v8
        with:
          name: maven-repository-java-${{ matrix.java }}
          path: /home/runner/.m2/repository

      - name: Download build outputs
        uses: actions/download-artifact@v8
        with:
          name: build-target-java-${{ matrix.java }}
          path: target

      - name: Run unit tests
        run: ./mvnw -B -ntp -P!quality-gates-all,nullaway verify

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report-java-${{ matrix.java }}
          path: target/site/jacoco
          if-no-files-found: error

  package:
    name: package / java ${{ matrix.java }}
    if: ${{ github.event.pull_request.draft == false }}
    needs:
      - build
      - test-unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["21", "25"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set Maven wrapper permissions
        run: chmod +x mvnw

      - name: Download Maven repository
        uses: actions/download-artifact@v8
        with:
          name: maven-repository-java-${{ matrix.java }}
          path: /home/runner/.m2/repository

      - name: Download build outputs
        uses: actions/download-artifact@v8
        with:
          name: build-target-java-${{ matrix.java }}
          path: target

      - name: Run package build
        run: ./mvnw -B -ntp -P!quality-gates-all,nullaway -DskipTests package

  quality-crap-utils-java:
    name: verify / quality-crap-utils-java / java ${{ matrix.java }}
    if: ${{ github.event.pull_request.draft == false }}
    needs:
      - build
      - test-unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["21", "25"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set Maven wrapper permissions
        run: chmod +x mvnw

      - name: Download Maven repository
        uses: actions/download-artifact@v8
        with:
          name: maven-repository-java-${{ matrix.java }}
          path: /home/runner/.m2/repository

      - name: Download build outputs
        uses: actions/download-artifact@v8
        with:
          name: build-target-java-${{ matrix.java }}
          path: target

      - name: Download JaCoCo report
        uses: actions/download-artifact@v8
        with:
          name: jacoco-report-java-${{ matrix.java }}
          path: target/site/jacoco

      - name: Run crap-java gate
        run: ./mvnw -B -ntp -P!quality-gates-all,quality-gate-crap,nullaway -DskipTests verify

  quality-cognitive-utils-java:
    name: verify / quality-cognitive-utils-java / java ${{ matrix.java }}
    if: ${{ github.event.pull_request.draft == false }}
    needs:
      - build
      - test-unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["21", "25"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set Maven wrapper permissions
        run: chmod +x mvnw

      - name: Download Maven repository
        uses: actions/download-artifact@v8
        with:
          name: maven-repository-java-${{ matrix.java }}
          path: /home/runner/.m2/repository

      - name: Download build outputs
        uses: actions/download-artifact@v8
        with:
          name: build-target-java-${{ matrix.java }}
          path: target

      - name: Download JaCoCo report
        uses: actions/download-artifact@v8
        with:
          name: jacoco-report-java-${{ matrix.java }}
          path: target/site/jacoco

      - name: Run cognitive-java gate
        run: ./mvnw -B -ntp -P!quality-gates-all,quality-gate-cognitive,nullaway -DskipTests verify
